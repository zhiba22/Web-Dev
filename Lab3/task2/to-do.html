<!doctype html>
<html>
    <head><charset meta = "utf-8">
        <title>To-Do List</title>
        <link rel="stylesheet" href="style.css">
        
        <nav><h2 style="color: white;">To-Do List</h2></nav>
    </head>
    <body>
        <main class="container">
    <form id="todo-form" class="todo-form">
        <label for="todo-input">ToDo List</label>
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="Enter a task..." required>
            <button type="submit">Add</button>
        </div>
    </form>

    <ul id="todo-list" class="todo-list">
    </ul>
    <button id="count-completed">Count Completed</button>
<script src="script.js"></script>
</main>
    </body>
</html>
