<div class="albums-header">
  <h1>Photo Albums</h1>
  <p *ngIf="!loading && !error">{{ albums.length }} albums loaded</p>

  <!-- SORT BUTTONS -->
  <div *ngIf="!loading && !error" style="display:flex; gap:0.75rem; margin-top:0.75rem;">
    <button 
      (click)="sortAlbums('asc')" 
      style="background:yellow; color:black; border:1px solid #c8a96e; padding:0.4rem 1rem; border-radius:6px; cursor:pointer;">
      ASC
    </button>
    <button 
      (click)="sortAlbums('desc')" 
      style="background:YELLOW; color:black; border:1px solid #c8a96e; padding:0.4rem 1rem; border-radius:6px; cursor:pointer;">
      DESC
    </button>
  </div>
</div>

<br>


<!-- LOADING SPINNER -->
<div *ngIf="loading" style="text-align:center; padding: 4rem;">
  <p>Loading albums...</p>
</div>

<!-- ALBUMS GRID -->
<div *ngIf="!loading" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap:1rem;">
  <div *ngFor="let album of albums" style="background:#1a1a24; border:1px solid #2e2e3f; border-radius:8px; padding:1.25rem;">
    
    <a [routerLink]="['/albums', album.id]" style="display:block; text-decoration:none; color:inherit;">
      <div style="font-size:0.75rem; color:#c8a96e; margin-bottom:0.5rem;">#{{ album.id }}</div>
      <p style="font-size:0.92rem; text-transform:capitalize;">{{ album.title }}</p>
    </a>

    <button (click)="deleteAlbum(album.id)" style="margin-top:0.75rem; background:transparent; color:#c0605a; border:1px solid #c0605a; padding:0.3rem 0.9rem; border-radius:6px; cursor:pointer;">
      Delete
    </button>

  </div>
</div>
<div *ngIf="error" style="color:#c0605a; padding:1rem;">
  {{ error }}
</div>
