<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: The dinner table</title>
        <style>
            table {
                border-collapse: collapse;
                width: 100%;
            }
            table, th, td {
                border: 1px solid black;
            }
            th,td {
                padding: 8px;
                text-align: center;
            }
        </style>
    </head>
    <body>
    
        <h1>Our dinner menu</h1>

        <table>
            <thead>
                <tr>
                    <th>Meal</th>
                    <th>Ingredients</th>
                    <th>Price</th>
                </tr></thead><tbody>
                <tr><td>Pizza</td>
                    <td>Cheese,Tomato</td>
                    <td>5$</td>
                </tr>
                <tr>
                    <td><Burger></td>
                    <td>Bread, Lettuce</td>
                    <td>4$</td>
                </tr></tbody>
        </table>

    </body>
</html>
