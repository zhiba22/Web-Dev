    <body>
    <h1>Hedgehog</h1>
    <p>The snail moves like a<br>
Hovercraft, held up by a<br>
Rubber cushion of itself,<br>
Sharing its secret<br><br>

With the hedgehog. The hedgehog<br>
Shares its secret with no one.<br>
We say, Hedgehog, come out<br>
Of yourself and we will love you.<br></p>
